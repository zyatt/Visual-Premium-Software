name: visualpremiumsoftware
description: Sistema de Gestão de Estoque e Compras
publish_to: 'none'
version: 1.2.0+3

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  # HTTP
  http: ^1.2.0
  # State management
  provider: ^6.1.2
  # Navigation
  go_router: ^13.2.0
  # UI
  google_fonts: ^6.2.1
  fl_chart: ^0.67.0
  shimmer: ^3.0.0
  # Utils
  intl: 0.20.2
  equatable: ^2.0.5
  dartz: ^0.10.1
  shared_preferences: ^2.2.3
  flutter_dotenv: ^5.2.1
  package_info_plus: ^8.0.0
  path_provider: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - .env